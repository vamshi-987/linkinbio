# Production overrides. Activate with SPRING_PROFILES_ACTIVE=prod.

jwt.secret=${JWT_SECRET}

# ===== Schema =====
# Flyway owns the schema in production. 'update' lets Hibernate infer and apply DDL at boot, which
# races the migrations and can silently diverge from what the SQL files describe; 'validate' instead
# asserts the entities match what Flyway built and refuses to start if they do not.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# ===== Object storage =====
app.storage.provider=s3
app.storage.s3.bucket=${S3_BUCKET}
app.storage.s3.access-key=${S3_ACCESS_KEY}
app.storage.s3.secret-key=${S3_SECRET_KEY}

# ===== Public origins =====
# Encoded into every profile/link QR code as well as driving CORS, so a wrong value here is not just
# a bad response — it is printed on a QR that outlives the deploy that set it.
frontend.url=${FRONTEND_URL}
# Read by nothing while app.storage.provider stays s3: LocalStorageService is its only consumer, and
# that bean is not created. Kept mandatory anyway because an APP_STORAGE_PROVIDER=local env var
# outranks this file — the local provider would then come up on the base file's http://localhost:8081
# default and write that origin onto user rows as avatar URLs, where a later fix cannot reach it.
app.base-url=${APP_BASE_URL}

# ===== Redis =====
# Every managed Redis (Upstash, Railway, ElastiCache in transit-encryption mode) speaks TLS. The base
# file defaults this off for a local container.
spring.data.redis.ssl.enabled=${REDIS_SSL:true}

# ===== Mail =====
# The base file leaves these blank so local dev can log codes to the console instead of sending
# them. In production that fallback means every real signup silently never receives its code, so
# both are mandatory — a missing one aborts startup by name.
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}

# ===== Logging =====
# The base file runs SQL and Spring Security at DEBUG, which is a development aid: in production it
# writes every statement and every authentication decision to the log, at real request volume.
logging.level.root=INFO
logging.level.com.backend.libserver=INFO
logging.level.org.hibernate.SQL=WARN
logging.level.org.springframework.security=WARN

# ===== Error responses =====
# Exception messages and stack traces describe internal structure; clients get the status code only.
spring.web.error.include-message=never
spring.web.error.include-stacktrace=never
spring.web.error.include-binding-errors=never
spring.web.error.include-exception=false

# ===== Server =====
# In-flight requests finish before the JVM exits, so a rolling deploy does not sever a click
# redirect or an upload mid-write.
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=20s
