# Local development overrides. Activate with:
#   ./mvnw spring-boot:run -Dspring-boot.run.profiles=local
# or SPRING_PROFILES_ACTIVE=local java -jar target/libserver-*.jar
#
# Never put a real secret in this file — it is committed. Secrets stay in env vars; the entries
# below only point at services running on your own machine.

# ===== Datasource (local PostgreSQL) =====
# Matches the postgres service in docker-compose.yml at the repo root: `docker compose up -d`.
# Port 5433, not the default 5432, because a dev machine usually already has something bound there
# (Postgres.app, another project's container) — and pointing at the wrong database fails silently.
spring.datasource.url=jdbc:postgresql://localhost:${POSTGRES_PORT:5433}/linkinbio
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}

# ===== Schema =====
# Same setting as production. The base file uses 'update', which lets Hibernate quietly add a column
# it infers from an entity — so a developer who adds a field and forgets the migration sees
# everything work locally, and the deploy is the first thing to fail. 'validate' moves that failure
# to the machine where the field was added.
spring.jpa.hibernate.ddl-auto=validate

# ===== Redis (local) =====
# Matches the redis service in docker-compose.yml. Port 6380 rather than 6379, for the same reason
# as Postgres above.
spring.data.redis.host=localhost
spring.data.redis.port=${REDIS_PORT:6380}
spring.data.redis.password=
spring.data.redis.ssl.enabled=false

# ===== Frontend (Vite dev server) =====
# Drives CORS; the prod default points at Vercel, which blocks a browser on localhost.
frontend.url=http://localhost:5173

# ===== Mail =====
# Local sends real email through Gmail SMTP, exactly like production — the settings are inherited
# from application.properties, so there is nothing to override here. The app password is a secret
# and must not live in this file; supply it in the environment:
#   MAIL_USERNAME=you@gmail.com MAIL_PASSWORD=your_16_char_app_password \
#     ./mvnw spring-boot:run -Dspring-boot.run.profiles=local
#
# Leave them unset to skip real sends and log the OTP code to this console instead.

# ===== Analytics =====
# The 15-minute production interval means a test click takes a quarter of an hour to reach the
# country/device panels, which reads as a bug while developing. Cheap to run often against a local
# database with a handful of rows.
app.analytics.rollup-interval-ms=60000
app.analytics.rollup-initial-delay-ms=5000

# ===== JWT =====
jwt.secret=local-dev-only-secret-not-used-anywhere-else-min-32-bytes

# ===== Logging =====
logging.level.com.backend.libserver=DEBUG
