spring.application.name=libserver

# ===== Datasource (PostgreSQL) =====
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/linkinbio}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# ===== JPA / Hibernate =====
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.show-sql=false

# ===== Flyway =====
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# ===== Redis =====
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.username=${REDIS_USERNAME:default}
spring.data.redis.password=${REDIS_PASSWORD:}
spring.data.redis.timeout=2000ms
spring.data.redis.ssl.enabled=${REDIS_SSL:false}

# ===== Server =====
server.port=${PORT:8081}
# Railway terminates TLS at its proxy, so every request otherwise reports the proxy's IP as the
# client and the per-IP rate limits would apply to all users as a single shared bucket.
server.forward-headers-strategy=framework

# ===== Logging =====
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.springframework.security=DEBUG

# ===== Cache =====
spring.cache.type=redis

# ===== JWT =====
jwt.secret=${JWT_SECRET:change-this-to-a-long-random-secret-string-in-prod}
jwt.expiration-ms=86400000

# ===== Frontend =====
frontend.url=${FRONTEND_URL:https://linkinbio-ecru.vercel.app}

# This app's own public origin. Used to build URLs for locally stored uploads, so they stay valid
# when the browser fetching them is on the frontend's domain rather than this one.
app.base-url=${APP_BASE_URL:http://localhost:8081}

# ===== Background jobs =====
# Scheduled links go live / expire at query time, but the public profile is cached — this sweep
# evicts the affected profiles so the change is visible within a tick. Both jobs are idempotent and
# re-cover their previous window, so a missed run costs nothing.
app.scheduling.link-visibility-ms=${LINK_VISIBILITY_SWEEP_MS:60000}
app.scheduling.link-visibility-initial-delay-ms=${LINK_VISIBILITY_INITIAL_DELAY_MS:15000}
# Rebuilds the pre-aggregated click rollups the dashboards read from.
app.analytics.rollup-interval-ms=${CLICK_ROLLUP_INTERVAL_MS:900000}
app.analytics.rollup-initial-delay-ms=${CLICK_ROLLUP_INITIAL_DELAY_MS:30000}
# Days rebuilt per run, counting today: clicks are written asynchronously, so an event can land just
# after midnight UTC and belong to the previous day.
app.analytics.rollup-lookback-days=${CLICK_ROLLUP_LOOKBACK_DAYS:2}

# ===== QR codes =====
app.qr.cache-ttl-hours=${QR_CACHE_TTL_HOURS:24}

# ===== Uploads =====
# Bounds are enforced twice: Spring rejects an oversized request before it is buffered, and
# ImageUploadValidator re-checks the decoded image (a small file can still be a huge raster).
app.upload.max-bytes=${UPLOAD_MAX_BYTES:2097152}
app.upload.max-dimension=${UPLOAD_MAX_DIMENSION:4096}
spring.servlet.multipart.max-file-size=${UPLOAD_MAX_FILE_SIZE:2MB}
spring.servlet.multipart.max-request-size=${UPLOAD_MAX_REQUEST_SIZE:4MB}

# ===== Object storage =====
# 'local' keeps uploads on disk and serves them from /api/public/media — no cloud account needed to
# run the project. Set to 's3' for AWS S3, MinIO, or R2; the S3 client is only created in that case,
# so a deployment with no credentials still starts.
app.storage.provider=${STORAGE_PROVIDER:local}
app.storage.local.dir=${STORAGE_LOCAL_DIR:uploads}
app.storage.s3.bucket=${S3_BUCKET:}
app.storage.s3.region=${S3_REGION:us-east-1}
# Set for MinIO/R2 (e.g. http://localhost:9000); blank means real AWS S3.
app.storage.s3.endpoint=${S3_ENDPOINT:}
# Leave blank to use the SDK's default credential chain (instance role, ~/.aws/credentials, env).
app.storage.s3.access-key=${S3_ACCESS_KEY:}
app.storage.s3.secret-key=${S3_SECRET_KEY:}
# Set to a CDN or public bucket origin to serve plain URLs; blank means objects stay private and
# each read mints a presigned URL valid for the window below.
app.storage.s3.public-base-url=${S3_PUBLIC_BASE_URL:}
app.storage.s3.presign-minutes=${S3_PRESIGN_MINUTES:60}

# ===== Mail (Gmail SMTP) =====
# OTP emails go out over Gmail's SMTP host. MAIL_PASSWORD must be a Google **app password** (16
# characters, generated at myaccount.google.com/apppasswords with 2-Step Verification on) — Google
# rejects the account's normal password. Leave the credentials blank to log the code to the server
# console instead of sending it (fine for local dev).
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
# Port 587 opens in the clear and upgrades; 'required' makes the send fail rather than silently
# continue as plaintext if the upgrade does not happen.
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
# Bound every phase of a send: without these, an unreachable SMTP host blocks a mail-pool thread
# indefinitely and the pool stops draining its queue.
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000
# Gmail rewrites a From address the authenticated account does not own, so this defaults to the
# account itself; set MAIL_FROM only to an alias Gmail has verified for that account.
app.mail.from=${MAIL_FROM:}
app.mail.from-name=${MAIL_FROM_NAME:OneLink}

# ===== Password reset OTP =====
app.otp.expiry-minutes=${OTP_EXPIRY_MINUTES:10}
app.otp.max-attempts=${OTP_MAX_ATTEMPTS:5}
app.otp.reset-token-minutes=${OTP_RESET_TOKEN_MINUTES:15}
# Per-user limits on issuing codes: how long before a new one can be sent, and the ceiling per hour.
# With max-attempts above, these bound guesses per hour and stop repeated requests flooding an inbox.
app.otp.resend-cooldown-seconds=${OTP_RESEND_COOLDOWN_SECONDS:60}
app.otp.max-per-hour=${OTP_MAX_PER_HOUR:5}
# A signup is not written to the users table until its code is verified — it lives in Redis until
# then, expiring after this many minutes if never confirmed, so no unverified row ever exists.
app.signup.pending-ttl-minutes=${SIGNUP_PENDING_TTL_MINUTES:30}
