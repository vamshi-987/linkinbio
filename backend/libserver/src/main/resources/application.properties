spring.application.name=libserver

# ===== Datasource (PostgreSQL) =====
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/linkinbio}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# ===== JPA / Hibernate =====
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.show-sql=false

# ===== Flyway =====
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# ===== Redis =====
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.username=${REDIS_USERNAME:default}
spring.data.redis.password=${REDIS_PASSWORD:}
spring.data.redis.timeout=2000ms

# ===== Server =====
server.port=${PORT:8081}

# ===== Logging =====
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.springframework.security=DEBUG

# ===== Cache =====
spring.cache.type=redis

# ===== JWT =====
jwt.secret=${JWT_SECRET:change-this-to-a-long-random-secret-string-in-prod}
jwt.expiration-ms=86400000

# ===== Frontend =====
frontend.url=${FRONTEND_URL:https://linkinbio-ecru.vercel.app}