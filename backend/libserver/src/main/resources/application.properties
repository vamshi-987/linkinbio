spring.application.name=libserver

# ===== Datasource (PostgreSQL) =====
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/linkinbio}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# ===== JPA / Hibernate =====
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.show-sql=false

# ===== Flyway =====
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# ===== Redis =====
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.username=${REDIS_USERNAME:default}
spring.data.redis.password=${REDIS_PASSWORD:}
spring.data.redis.timeout=2000ms
spring.data.redis.ssl.enabled=${REDIS_SSL:false}

# ===== Server =====
server.port=${PORT:8081}
# Railway terminates TLS at its proxy, so every request otherwise reports the proxy's IP as the
# client and the per-IP rate limits would apply to all users as a single shared bucket.
server.forward-headers-strategy=framework

# ===== Logging =====
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.springframework.security=DEBUG

# ===== Cache =====
spring.cache.type=redis

# ===== JWT =====
jwt.secret=${JWT_SECRET:change-this-to-a-long-random-secret-string-in-prod}
jwt.expiration-ms=86400000

# ===== Frontend =====
frontend.url=${FRONTEND_URL:https://linkinbio-ecru.vercel.app}

# ===== Mail (SMTP) =====
# Configure these env vars to send real OTP emails. If MAIL_HOST is left blank,
# the app still runs and logs the OTP to the server console (dev fallback) instead of crashing.
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# ===== Password reset OTP =====
app.mail.from=${MAIL_FROM:vamshivardhan987@gmail.com}
app.otp.expiry-minutes=${OTP_EXPIRY_MINUTES:10}
app.otp.max-attempts=${OTP_MAX_ATTEMPTS:5}
app.otp.reset-token-minutes=${OTP_RESET_TOKEN_MINUTES:15}
# Per-user limits on issuing codes: how long before a new one can be sent, and the ceiling per hour.
# With max-attempts above, these bound guesses per hour and stop repeated requests flooding an inbox.
app.otp.resend-cooldown-seconds=${OTP_RESEND_COOLDOWN_SECONDS:60}
app.otp.max-per-hour=${OTP_MAX_PER_HOUR:5}