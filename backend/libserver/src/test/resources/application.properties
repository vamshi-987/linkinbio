# Test overrides. Tests must not depend on SMTP credentials or reach the network, so none are set:
# with spring.mail.username/password blank, EmailServiceImpl never opens a connection and logs OTP
# codes to the console instead of sending them.

jwt.secret=test-only-secret-not-used-outside-the-test-suite

# Datasource is supplied per-test (Testcontainers); Flyway runs against it as in production.
spring.flyway.enabled=true
